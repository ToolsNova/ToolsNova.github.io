<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-brain"></i>
            <span>ToolsNova AI</span>
        </div>
        <div class="nav-links">
            <a href="#" id="newChatBtn"><i class="fas fa-plus-circle"></i><span>New Chat</span></a>
            <a href="#" id="sidebarToggle"><i class="fas fa-bars"></i><span>Collapse</span></a>
        </div>
        <div class="chat-history-section">
            <div class="history-header">Recent Chats</div>
            <div id="chatHistory"></div>
        </div>
        <div class="sidebar-footer">
            <div id="sidebarAuth">
                <a href="signup.html" class="logout-btn" style="color:#3b82f6"><i class="fas fa-user-plus"></i><span>Sign Up</span></a>
                <a href="login.html" class="logout-btn"><i class="fas fa-sign-in-alt"></i><span>Login</span></a>
            </div>
            <div id="userInfo" style="display: none;">
                <div class="user-info"><i class="fas fa-user-circle"></i><span id="sidebarUserName"></span></div>
                <a href="#" id="sidebarLogout" class="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </div>
    </div>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Main Chat Area -->
    <div class="main-chat">
        <div class="chat-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="current-title" id="currentChatTitle">New Chat</div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle"><i class="far fa-moon"></i></button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="messages-wrapper" id="messagesWrapper">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon"><i class="fas fa-robot"></i></div>
                    <h2>Welcome to ToolsNova AI</h2>
                    <p>Your intelligent assistant powered by Google Gemini</p>
                    <p style="margin-top: 20px; color: #64748b;">Ask me anything! I can help with code, questions, and file analysis.</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="file-preview-container" id="filePreviewContainer"></div>
            <div class="input-wrapper">
                <button class="icon-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                <button class="icon-btn" id="sendBtn" style="color: #3b82f6;"><i class="fas fa-paper-plane"></i></button>
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
        </div>
    </div>
</div>

<script src="js/ai-chat.js"></script>
</body>
