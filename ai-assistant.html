<body>
    <div class="app">
        <!-- Sidebar -->
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>ToolsNova AI</h2>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            
            <!-- New Chat Button -->
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i>
                <span>New Chat</span>
            </button>
            
            <!-- Chat History -->
            <div class="chat-history" id="chatHistory"></div>
            
            <!-- User Profile Section -->
            <div class="user-profile-section">
                <!-- Guest View - Login/Signup buttons -->
                <div class="auth-buttons" id="sidebarAuth">
                    <a href="login.html" class="btn-login">Login</a>
                    <a href="signup.html" class="btn-signup">Sign Up</a>
                </div>
                
                <!-- Logged In User View - User info and logout -->
                <div class="user-info" id="userInfo" style="display: none;">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="sidebarUserName">User</div>
                        <div class="user-status">Online</div>
                    </div>
                    <button class="logout-icon" id="sidebarLogout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main">
            <!-- Navbar -->
            <header class="chat-navbar">
                <div class="nav-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="logo">
                        <i class="fas fa-star"></i>
                        <span>ToolsNova</span>
                    </div>
                    <div class="current-chat-title" id="currentChatTitle"></div>
                </div>
                
                <div class="nav-right">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="far fa-moon"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages-wrapper" id="messagesWrapper">
                    <!-- Welcome Screen (No Chips) -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h2>How can I help you today?</h2>
                        <p>Ask me anything - I can write code, answer questions, and Give Suggestion!</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Type your message... (Shift+Enter for new line)" 
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div id="filePreviewContainer" class="file-preview-container"></div>
            </div>
        </main>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileOverlay"></div>
