<title>Forgot Password - ToolsNova</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="robots" content="noindex, nofollow">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="./css/style.css">

<style>
    .auth-container {
        max-width: 450px;
        margin: 60px auto;
        padding: 40px;
        background: var(--bg-primary);
        border-radius: 60px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
    }
    .auth-title {
        font-size: 2rem;
        margin-bottom: 10px;
        text-align: center;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .auth-subtitle {
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 30px;
    }
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-weight: 500;
        color: var(--text-primary);
        margin-left: 10px;
    }
    .form-group input {
        padding: 16px 20px;
        border: 2px solid var(--border);
        border-radius: 60px;
        font-size: 1rem;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.2s ease;
    }
    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .auth-btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        padding: 16px;
        border: none;
        border-radius: 60px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 10px;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px #3b82f6;
    }
    .auth-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    .auth-footer {
        text-align: center;
        margin-top: 30px;
        color: var(--text-secondary);
    }
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    .auth-footer a:hover {
        text-decoration: underline;
    }
    .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: #dc2626;
        padding: 12px 20px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 20px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        display: none;
    }
    .dark-mode .error-message {
        color: #fca5a5;
    }
    .success-message {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        padding: 12px 20px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 20px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        display: none;
    }
    .dark-mode .success-message {
        color: #a7f3d0;
    }
    .info-message {
        background: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
        padding: 12px 20px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 20px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        display: none;
    }
    .back-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        text-decoration: none;
        margin-bottom: 20px;
        font-size: 0.95rem;
        transition: color 0.2s ease;
    }
    .back-home:hover {
        color: var(--primary);
    }
    .back-home i {
        font-size: 0.9rem;
    }

    .desktop-sidebar,
    .desktop-sidebar-toggle {
        display: none !important;
    }
    body {
        padding-left: 0 !important;
    }
    .navbar {
        left: 0 !important;
    }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-star"></i>
                <span>ToolsNova</span>
            </div>
            
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="ai-assistant.html">AI Assistant</a>
                <a href="tools.html">Tools</a>
                <a href="about.html">About</a>
                <a href="login.html" class="login-link">Login</a>
                <a href="signup.html" class="nav-cta">Sign Up</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="far fa-moon"></i>
                </button>
                <div class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="login.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
        
        <div class="auth-container">
            <div style="text-align: center;">
                <i class="fas fa-key" style="font-size: 3rem; color: #3b82f6; margin-bottom: 15px;"></i>
            </div>
            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="info-message" id="infoMessage"></div>
            
            <form class="auth-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required autocomplete="email">
                </div>
                <button type="submit" class="auth-btn" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            
            <div class="auth-footer">
                Remember your password? <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC6rF7Pg7j-NPioZ8Ei70GCj_megjD7UQw",
            authDomain: "toolsnova-user.firebaseapp.com",
            projectId: "toolsnova-user",
            storageBucket: "toolsnova-user.firebasestorage.app",
            messagingSenderId: "907228879212",
            appId: "1:907228879212:web:7e82b085899deb14857b49"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // DOM Elements
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('resetBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const infoDiv = document.getElementById('infoMessage');

        // Hide all messages
        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            infoDiv.style.display = 'none';
        }

        // Show error message
        function showError(message) {
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            infoDiv.style.display = 'none';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            successDiv.innerHTML = `
                <i class="fas fa-check-circle"></i> ${message}
                <div style="font-size: 0.8rem; margin-top: 8px; opacity: 0.9;">
                    <i class="fas fa-envelope"></i> 📧 <strong>Tip:</strong> Also check your SPAM/JUNK folder!
                </div>
            `;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 8000);
        }

        // Show info message
        function showInfo(message) {
            infoDiv.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            infoDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Send password reset email
        async function sendResetEmail(email) {
            try {
                showInfo('Sending reset link...');
                
                await auth.sendPasswordResetEmail(email, {
                    url: window.location.origin + '/login.html',
                    handleCodeInApp: false
                });
                
                showSuccess(`Reset link sent to ${email}! Please check your inbox.`);
                emailInput.value = '';
                
                // Clear info message after 2 seconds
                setTimeout(() => {
                    infoDiv.style.display = 'none';
                }, 2000);
                
            } catch (error) {
                console.error('Reset error:', error);
                
                let errorMessage = '';
                switch(error.code) {
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email address.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many requests. Please try again later.';
                        break;
                    default:
                        errorMessage = 'Failed to send reset email. Please try again.';
                }
                showError(errorMessage);
                infoDiv.style.display = 'none';
            }
        }

        // Form submit handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showError('Please enter your email address.');
                return;
            }
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address.');
                return;
            }
            
            // Disable button while sending
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            
            await sendResetEmail(email);
            
            // Re-enable button
            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
        });

        // Enter key support
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Dark mode toggle
        const themeToggle = document.querySelector('.theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const icon = this.querySelector('i');
                icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'far fa-moon';
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            if (themeToggle) {
                const icon = themeToggle.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }

        // Mobile menu
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        if (mobileBtn) {
            const overlay = document.createElement('div');
            overlay.className = 'mobile-menu-overlay';
            
            const menu = document.createElement('div');
            menu.className = 'mobile-menu';
            menu.innerHTML = `
                <div class="mobile-menu-header">
                    <div class="mobile-menu-logo">
                        <i class="fas fa-star"></i>
                        <span>ToolsNova</span>
                    </div>
                    <button class="mobile-menu-close"><i class="fas fa-times"></i></button>
                </div>
                <div class="mobile-menu-links">
                    <a href="index.html" class="mobile-link">Home</a>
                    <a href="ai-assistant.html" class="mobile-link">AI Assistant</a>
                    <a href="tools.html" class="mobile-link">Tools</a>
                    <a href="about.html" class="mobile-link">About</a>
                    <a href="login.html" class="mobile-link">Login</a>
                    <a href="signup.html" class="mobile-link mobile-cta">Sign Up</a>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(menu);
            
            mobileBtn.addEventListener('click', () => {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeBtn = menu.querySelector('.mobile-menu-close');
            const closeMenu = () => {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeBtn) closeBtn.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
        }
    </script>
</body>
</html>
