<script>
  (function() {
    // 1. Technical Bot Check (The Speed-Bump)
    const isBot = navigator.webdriver || !navigator.languages || /HeadlessChrome/.test(navigator.userAgent);
    if (isBot) {
      window.stop(); // Stops the page for simple bots
      document.documentElement.innerHTML = "<div style='display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;'><h4>Security Check: Please use a standard browser.</h4></div>";
      return;
    }

    // 2. Prepare Human Verification for Layer 2
    window.isVerifiedHuman = false;
    const humanEvents = ['mousedown', 'touchstart', 'scroll', 'keydown'];
    const verify = () => {
      if(!window.isVerifiedHuman) {
        window.isVerifiedHuman = true;
        window.dispatchEvent(new Event('human_verified'));
        humanEvents.forEach(e => window.removeEventListener(e, verify));
      }
    };
    humanEvents.forEach(e => window.addEventListener(e, verify, {passive: true}));
  })();
</script>

            <h1 class="auth-title">Welcome Back</h1>

                <div class="form-group">

<!-- Your existing Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>


    
    <script>
        // Your Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyC6rF7Pg7j-NPioZ8Ei70GCj_megjD7UQw",
        authDomain: "toolsnova-user.firebaseapp.com",
        projectId: "toolsnova-user",
        storageBucket: "toolsnova-user.firebasestorage.app",
        messagingSenderId: "907228879212",
        appId: "1:907228879212:web:7e82b085899deb14857b49"
    };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Email/Password Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            hideMessages();
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                    
                    let errorMessage = '';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            errorMessage = 'No account found. Please sign up.';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'Incorrect password.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email format.';
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = 'Too many attempts. Try again later.';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        });

        // Google Sign-In
        if (googleSignInBtn) {
            googleSignInBtn.addEventListener('click', function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                
                // Optional: Add scopes
                provider.addScope('profile');
                provider.addScope('email');
                
                // Optional: Set custom parameters
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                googleSignInBtn.disabled = true;
                googleSignInBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                
                auth.signInWithPopup(provider)
                    .then((result) => {
                        // Success
                        console.log('Google sign-in success:', result.user);
                        showSuccess('Login successful! Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    })
                    .catch((error) => {
                        googleSignInBtn.disabled = false;
                        googleSignInBtn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
                        
                        console.error('Google sign-in error:', error);
                        
                        let errorMessage = '';
                        switch(error.code) {
                            case 'auth/popup-closed-by-user':
                                errorMessage = 'Sign-in cancelled. Please try again.';
                                break;
                            case 'auth/popup-blocked':
                                errorMessage = 'Popup was blocked. Please allow popups.';
                                break;
                            case 'auth/cancelled-popup-request':
                                errorMessage = 'Sign-in cancelled.';
                                break;
                            default:
                                errorMessage = error.message;
                        }
                        showError(errorMessage);
                    });
            });
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Dark mode toggle
        const themeToggle = document.querySelector('.theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const icon = this.querySelector('i');
                icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'far fa-moon';
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            if (themeToggle) {
                const icon = themeToggle.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }

        // Mobile menu (same as homepage)
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        if (mobileBtn) {
            const overlay = document.createElement('div');
            overlay.className = 'mobile-menu-overlay';
            
            const menu = document.createElement('div');
            menu.className = 'mobile-menu';
            menu.innerHTML = `
                <div class="mobile-menu-header">
                    <div class="mobile-menu-logo">
                        <i class="fas fa-star"></i>
                        <span>ToolsNova</span>
                    </div>
                    <button class="mobile-menu-close"><i class="fas fa-times"></i></button>
                </div>
                <div class="mobile-menu-links">
                    <a href="index.html" class="mobile-link">Home</a>
                    <a href="ai-assistant.html" class="mobile-link">AI Assistant</a>
                    <a href="./tools.html" class="mobile-link">Tools</a>
                    <a href="about.html" class="mobile-link">About</a>
                    <a href="login.html" class="mobile-link active">Login</a>
                    <a href="signup.html" class="mobile-link mobile-cta">Sign Up</a>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(menu);
            
            mobileBtn.addEventListener('click', () => {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeBtn = menu.querySelector('.mobile-menu-close');
            const closeMenu = () => {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeBtn) closeBtn.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
        }
    </script>
</body>
