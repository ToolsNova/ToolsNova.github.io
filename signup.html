<title>Sign Up - ToolsNova</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="robots" content="noindex, nofollow">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="./css/style.css">

<style>
    .auth-container {
        max-width: 450px;
        margin: 60px auto;
        padding: 40px;
        background: var(--bg-primary);
        border-radius: 60px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
    }
    .auth-title {
        font-size: 2rem;
        margin-bottom: 10px;
        text-align: center;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .auth-subtitle {
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 30px;
    }
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-weight: 500;
        color: var(--text-primary);
        margin-left: 10px;
    }
    .form-group input {
        padding: 16px 20px;
        border: 2px solid var(--border);
        border-radius: 60px;
        font-size: 1rem;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.2s ease;
    }
    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .password-hint {
        font-size: 0.75rem;
        color: var(--text-tertiary);
        margin-top: 4px;
        margin-left: 12px;
    }
    .password-hint.valid {
        color: #10b981;
    }
    .password-hint.invalid {
        color: #ef4444;
    }
    .auth-btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        padding: 16px;
        border: none;
        border-radius: 60px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 10px;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px #3b82f6;
    }
    .auth-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    .auth-footer {
        text-align: center;
        margin-top: 30px;
        color: var(--text-secondary);
    }
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    /* Google Sign-In Styles */
    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 25px 0 20px;
        color: var(--text-secondary);
    }
    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--border);
    }
    .divider span {
        padding: 0 15px;
        font-size: 0.9rem;
        text-transform: uppercase;
    }
    .google-btn {
        width: 100%;
        padding: 14px;
        background: white;
        color: #444;
        border: 2px solid var(--border);
        border-radius: 60px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
    }
    .dark-mode .google-btn {
        background: #1f2937;
        color: #f9fafb;
        border-color: #374151;
    }
    .google-btn:hover {
        background: #f5f5f5;
        border-color: #4285f4;
        transform: translateY(-2px);
    }
    .dark-mode .google-btn:hover {
        background: #374151;
    }
    .google-btn i {
        color: #4285f4;
        font-size: 1.2rem;
    }
    .google-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* Simple Success Message (In-Page) */
    .success-message {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        padding: 16px 20px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.95rem;
        margin-bottom: 20px;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 10px;
        animation: slideDown 0.5s ease;
    }
    .success-message.show {
        display: flex;
    }
    .success-message i {
        font-size: 1.2rem;
    }
    
    /* Error Message */
    .error-message {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        padding: 16px 20px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.95rem;
        margin-bottom: 20px;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 10px;
        animation: slideDown 0.5s ease;
    }
    .error-message.show {
        display: flex;
    }
    .error-message i {
        font-size: 1.2rem;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .desktop-sidebar,
    .desktop-sidebar-toggle {
        display: none !important;
    }
    body {
        padding-left: 0 !important;
    }
    .navbar {
        left: 0 !important;
    }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-star"></i>
                <span>ToolsNova</span>
            </div>
            
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="ai-assistant.html">AI Assistant</a>
                <a href="tools.html">Tools</a>
                <a href="about.html">About</a>
                <a href="login.html" class="login-link">Login</a>
                <a href="signup.html" class="nav-cta active">Sign Up</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="far fa-moon"></i>
                </button>
                <div class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; margin-bottom: 20px;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-container">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Get unlimited access to all tools</p>
            
            <!-- Success Message -->
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Account created successfully! Redirecting...</span>
            </div>
            
            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            
            <!-- Google Sign-Up Button -->
            <button class="google-btn" id="googleSignUpBtn">
                <i class="fab fa-google"></i>
                Sign up with Google
            </button>
            
            <div class="divider">
                <span>or sign up with email</span>
            </div>
            
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                    <div class="password-hint" id="passwordHint">
                        <i class="fas fa-info-circle"></i> Must be at least 6 characters with 1 letter and 1 number
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC6rF7Pg7j-NPioZ8Ei70GCj_megjD7UQw",
            authDomain: "toolsnova-user.firebaseapp.com",
            projectId: "toolsnova-user",
            storageBucket: "toolsnova-user.firebasestorage.app",
            messagingSenderId: "907228879212",
            appId: "1:907228879212:web:7e82b085899deb14857b49"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // DOM elements
        const signupForm = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const signupBtn = document.getElementById('signupBtn');
        const googleSignUpBtn = document.getElementById('googleSignUpBtn');
        const passwordHint = document.getElementById('passwordHint');
        const successMessageDiv = document.getElementById('successMessage');
        const errorMessageDiv = document.getElementById('errorMessage');
        const successText = document.getElementById('successText');
        const errorText = document.getElementById('errorText');

        // Show success message
        function showSuccess(message) {
            successText.textContent = message;
            successMessageDiv.classList.add('show');
            errorMessageDiv.classList.remove('show');
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                successMessageDiv.classList.remove('show');
            }, 3000);
        }

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessageDiv.classList.add('show');
            successMessageDiv.classList.remove('show');
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                errorMessageDiv.classList.remove('show');
            }, 3000);
        }

        // Password validation function
        function validatePassword(password) {
            const hasMinLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /\d/.test(password);
            
            return {
                isValid: hasMinLength && hasLetter && hasNumber,
                hasMinLength: hasMinLength,
                hasLetter: hasLetter,
                hasNumber: hasNumber
            };
        }

        // Update password hint UI
        function updatePasswordHint() {
            const password = passwordInput.value;
            const validation = validatePassword(password);
            
            let hintHtml = '<i class="fas fa-info-circle"></i> ';
            
            if (password.length === 0) {
                hintHtml += 'Must be at least 6 characters with 1 letter and 1 number';
                passwordHint.className = 'password-hint';
            } else if (validation.isValid) {
                hintHtml += '<i class="fas fa-check-circle"></i> Strong password!';
                passwordHint.className = 'password-hint valid';
            } else {
                hintHtml += 'Password must have: ';
                const requirements = [];
                if (!validation.hasMinLength) requirements.push('6+ characters');
                if (!validation.hasLetter) requirements.push('1 letter');
                if (!validation.hasNumber) requirements.push('1 number');
                hintHtml += requirements.join(', ');
                passwordHint.className = 'password-hint invalid';
            }
            
            passwordHint.innerHTML = hintHtml;
        }

        // Real-time password validation
        passwordInput.addEventListener('input', updatePasswordHint);
        passwordInput.addEventListener('keyup', updatePasswordHint);

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Email/Password Sign Up
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            // Validation
            if (!email || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Password validation
            const passwordValidation = validatePassword(password);
            if (!passwordValidation.isValid) {
                showError('Password must be at least 6 characters with at least 1 letter and 1 number');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    showSuccess('✅ Account created successfully! Redirecting...');
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Create Account';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                })
                .catch((error) => {
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Create Account';
                    
                    let errorMessage = '';
                    switch(error.code) {
                        case 'auth/email-already-in-use':
                            errorMessage = 'This email is already registered. Please login instead.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address.';
                            break;
                        case 'auth/weak-password':
                            errorMessage = 'Password is too weak. Please use at least 6 characters with letters and numbers.';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        });

        // Google Sign-Up
        if (googleSignUpBtn) {
            googleSignUpBtn.addEventListener('click', function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');
                provider.setCustomParameters({ prompt: 'select_account' });
                
                googleSignUpBtn.disabled = true;
                googleSignUpBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                
                auth.signInWithPopup(provider)
                    .then(() => {
                        showSuccess('✅ Account created successfully! Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    })
                    .catch((error) => {
                        googleSignUpBtn.disabled = false;
                        googleSignUpBtn.innerHTML = '<i class="fab fa-google"></i> Sign up with Google';
                        
                        let errorMessage = '';
                        switch(error.code) {
                            case 'auth/popup-closed-by-user':
                                errorMessage = 'Sign-up cancelled. Please try again.';
                                break;
                            case 'auth/popup-blocked':
                                errorMessage = 'Popup was blocked. Please allow popups.';
                                break;
                            case 'auth/account-exists-with-different-credential':
                                errorMessage = 'An account already exists with this email. Please login instead.';
                                break;
                            default:
                                errorMessage = error.message;
                        }
                        showError(errorMessage);
                    });
            });
        }

        // Dark mode toggle
        const themeToggle = document.querySelector('.theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const icon = this.querySelector('i');
                icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'far fa-moon';
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            if (themeToggle) {
                const icon = themeToggle.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }

        // Mobile menu
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        if (mobileBtn) {
            const overlay = document.createElement('div');
            overlay.className = 'mobile-menu-overlay';
            
            const menu = document.createElement('div');
            menu.className = 'mobile-menu';
            menu.innerHTML = `
                <div class="mobile-menu-header">
                    <div class="mobile-menu-logo">
                        <i class="fas fa-star"></i>
                        <span>ToolsNova</span>
                    </div>
                    <button class="mobile-menu-close"><i class="fas fa-times"></i></button>
                </div>
                <div class="mobile-menu-links">
                    <a href="index.html" class="mobile-link">Home</a>
                    <a href="ai-assistant.html" class="mobile-link">AI Assistant</a>
                    <a href="tools.html" class="mobile-link">Tools</a>
                    <a href="about.html" class="mobile-link">About</a>
                    <a href="login.html" class="mobile-link">Login</a>
                    <a href="signup.html" class="mobile-link mobile-cta active">Sign Up</a>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(menu);
            
            mobileBtn.addEventListener('click', () => {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeBtn = menu.querySelector('.mobile-menu-close');
            const closeMenu = () => {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeBtn) closeBtn.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
        }
    </script>
</body>
</html>
