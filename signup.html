    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
            padding: 40px;
            background: var(--bg-primary);
            border-radius: 60px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .auth-title {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-weight: 500;
            color: var(--text-primary);
            margin-left: 10px;
        }
        .form-group input {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 60px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .auth-btn {
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
        }
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: none;
        }
        .password-hint {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 4px;
            margin-left: 10px;
        }
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }
        .back-home:hover {
            color: var(--primary);
        }
        .back-home i {
            font-size: 0.9rem;
        }
        
        /* Google Sign-In Styles */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0 20px;
            color: var(--text-secondary);
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        
        .divider span {
            padding: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #444;
            border: 2px solid var(--border);
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .dark-mode .google-btn {
            background: #1f2937;
            color: #f9fafb;
            border-color: #374151;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            border-color: #4285f4;
            transform: translateY(-2px);
        }
        
        .dark-mode .google-btn:hover {
            background: #374151;
        }
        
        .google-btn i {
            color: #4285f4;
            font-size: 1.2rem;
        }
        
        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>

    <div class="container">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-container">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Get unlimited access to all tools</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <!-- Google Sign-Up Button -->
            <button class="google-btn" id="googleSignUpBtn">
                <i class="fab fa-google"></i>
                Sign up with Google
            </button>
            
            <div class="divider">
                <span>or sign up with email</span>
            </div>
            
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                    <div class="password-hint">Must be at least 6 characters</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

<!-- Your existing Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- ✅ THIS IS THE NEW AI SDK YOU NEED -->
<!-- Google Gemini AI SDK -->
<script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
    
    <script>
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBADT8ZDZ9TGEVeVm73Yf_rwI6YmAtjRa8",
            authDomain: "toolsnova-869.firebaseapp.com",
            projectId: "toolsnova-869",
            storageBucket: "toolsnova-869.firebasestorage.app",
            messagingSenderId: "393315506444",
            appId: "1:393315506444:web:595807ed58abe6b6ad9129"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // DOM elements
        const signupForm = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const signupBtn = document.getElementById('signupBtn');
        const googleSignUpBtn = document.getElementById('googleSignUpBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Email/Password Sign Up
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (!email || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';
            hideMessages();
            
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    showSuccess('Account created successfully! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Create Account';
                    
                    let errorMessage = '';
                    switch(error.code) {
                        case 'auth/email-already-in-use':
                            errorMessage = 'This email is already registered. Please login instead.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address.';
                            break;
                        case 'auth/weak-password':
                            errorMessage = 'Password is too weak. Please use at least 6 characters.';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        });

        // Google Sign-Up
        if (googleSignUpBtn) {
            googleSignUpBtn.addEventListener('click', function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                
                provider.addScope('profile');
                provider.addScope('email');
                
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                googleSignUpBtn.disabled = true;
                googleSignUpBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                
                auth.signInWithPopup(provider)
                    .then((result) => {
                        // This is a new user signing up with Google
                        console.log('Google sign-up success:', result.user);
                        showSuccess('Account created successfully! Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    })
                    .catch((error) => {
                        googleSignUpBtn.disabled = false;
                        googleSignUpBtn.innerHTML = '<i class="fab fa-google"></i> Sign up with Google';
                        
                        console.error('Google sign-up error:', error);
                        
                        let errorMessage = '';
                        switch(error.code) {
                            case 'auth/popup-closed-by-user':
                                errorMessage = 'Sign-up cancelled. Please try again.';
                                break;
                            case 'auth/popup-blocked':
                                errorMessage = 'Popup was blocked. Please allow popups.';
                                break;
                            case 'auth/cancelled-popup-request':
                                errorMessage = 'Sign-up cancelled.';
                                break;
                            case 'auth/account-exists-with-different-credential':
                                errorMessage = 'An account already exists with the same email address but different sign-in credentials.';
                                break;
                            default:
                                errorMessage = error.message;
                        }
                        showError(errorMessage);
                    });
            });
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Dark mode toggle
        const themeToggle = document.querySelector('.theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const icon = this.querySelector('i');
                icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'far fa-moon';
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            if (themeToggle) {
                const icon = themeToggle.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }

        // Mobile menu
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        if (mobileBtn) {
            const overlay = document.createElement('div');
            overlay.className = 'mobile-menu-overlay';
            
            const menu = document.createElement('div');
            menu.className = 'mobile-menu';
            menu.innerHTML = `
                <div class="mobile-menu-header">
                    <div class="mobile-menu-logo">
                        <i class="fas fa-star"></i>
                        <span>ToolsNova</span>
                    </div>
                    <button class="mobile-menu-close"><i class="fas fa-times"></i></button>
                </div>
                <div class="mobile-menu-links">
                    <a href="index.html" class="mobile-link">Home</a>
                    <a href="ai-assistant.html" class="mobile-link">AI Assistant</a>
                    <a href="./tools.html" class="mobile-link">Tools</a>
                    <a href="about.html" class="mobile-link">About</a>
                    <a href="login.html" class="mobile-link">Login</a>
                    <a href="signup.html" class="mobile-link mobile-cta active">Sign Up</a>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(menu);
            
            mobileBtn.addEventListener('click', () => {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeBtn = menu.querySelector('.mobile-menu-close');
            const closeMenu = () => {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeBtn) closeBtn.addEventListener('click', closeMenu);
            overlay.addEventListener('click', closeMenu);
        }
    </script>
</body>
